# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:papertrading}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=${JWT_SECRET:your-super-secret-key-that-is-at-least-32-bytes-long-for-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Polygon.io Configuration
polygon.api.key=${POLYGON_API_KEY:your-api-key-here}
polygon.api.url=https://api.polygon.io

# Application Name
spring.application.name=paper-trading-backend
